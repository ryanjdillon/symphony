version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
